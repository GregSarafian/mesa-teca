<style>
/* --head and --tail must be typed so CSS can interpolate them as numbers */
@property --head {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}
@property --tail {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --bg: #ffffff;
  --fg: #000000;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0a0a;
    --fg: #ffffff;
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--fg);
  display: grid;
  place-items: center;
  -webkit-font-smoothing: antialiased;
}

.logo-button {
  appearance: none;
  background: none;
  border: none;
  padding: 20px;
  margin: 0;
  cursor: pointer;
  color: inherit;
  display: block;
  width: min(38vw, 32vh, 280px);
  outline: none;
  border-radius: 12px;
}

.logo-button:focus-visible {
  outline: 2px solid currentColor;
  outline-offset: 4px;
}

.logo-button:active {
  transform: scale(0.9);
  transition: transform 80ms ease-out;
}

.logo {
  display: block;
  width: 100%;
  height: auto;
  overflow: visible;
  transform-origin: center;
}

.logo-ring,
.logo-letters {
  fill: currentColor;
  opacity: 0.1;
}

.ring {
  --head: 0;
  --tail: 0;
  opacity: 0;
}

/*
  pathLength="100" normalises one full lap to 100 units.
  --head travels 0→200 (two laps); --tail starts at 0, then chases head.
  chain_length = head − tail  (grows 0→100, then shrinks 100→0)
  segment_len  = chain_length / 5  (each of 5 colours owns 1/5)

  For colour N (--n: 1…5, where 1 = leading blue, 5 = trailing yellow):
    dashoffset = −head + N × segment_len
    → colour N occupies the Nth slot counting back from the head
*/
.ring path {
  stroke-dasharray:
    calc((var(--head) - var(--tail)) / 5)
    calc(100 - (var(--head) - var(--tail)) / 5);
  stroke-dashoffset:
    calc(-1 * var(--head) + var(--n) * (var(--head) - var(--tail)) / 5);
  stroke-width: 24;
  fill: none;
  stroke-linecap: butt;
}

.logo-button.playing .logo {
  animation: logo-bounce 1000ms linear forwards;
}

.logo-button.playing .logo-letters {
  animation: logo-opacity 1000ms linear forwards;
}

.logo-button.playing .ring {
  /* Fully linear — no ease in or out anywhere */
  animation: ring-anim 1000ms linear forwards;
}

@keyframes logo-bounce {
  0%  { transform: scale(1);    animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
  15% { transform: scale(1.12); animation-timing-function: linear; }
  85% { transform: scale(1.12); animation-timing-function: cubic-bezier(0.4, 0, 1, 1); }
  94% { transform: scale(0.94); animation-timing-function: cubic-bezier(0, 0, 0.6, 1); }
  100%{ transform: scale(1); }
}

@keyframes logo-opacity {
  0%  { opacity: 0.1; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100%{ opacity: 0.1; }
}

@keyframes ring-anim {
  /*
    Phase 1 (0→40%): head races ahead at speed 2.5, tail stays at 0.
      Chain grows from 0 to 100 (full ring).
    Phase 2 (40→100%): head continues, tail now moves at speed ~3.3.
      Tail catches head; chain shrinks from 100 back to 0.
    Both converge at position 200 (= top-center after 2 laps).
  */
  0% {
    --head: 0;
    --tail: 0;
    opacity: 1;
  }
  40% {
    --head: 100;
    --tail: 0;
    opacity: 1;
  }
  96% {
    --head: 192;
    --tail: 184;
    opacity: 1;
  }
  100% {
    --head: 200;
    --tail: 200;
    opacity: 0;
  }
}

@media (prefers-reduced-motion: reduce) {
  .logo-button.playing .logo,
  .logo-button.playing .logo-letters,
  .logo-button.playing .ring {
    animation: none;
  }
}
</style>

<script type="module">
import { WebHaptics } from '/vendor/web-haptics/index.mjs';

const haptics = new WebHaptics();

const btn = document.querySelector('.logo-button');
btn.addEventListener('click', () => {
  haptics.trigger([
    { duration: 500, intensity: 0.73 },
    { delay: 30, duration: 50, intensity: 0.31 },
  ]);
  btn.classList.remove('playing');
  void btn.offsetWidth;
  btn.classList.add('playing');
});
